name: Build Flutter APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      # ✅ NEW FIX: Added --project-name mall to bypass the Capital letter error!
      - name: Verify or Create Android Folder
        run: |
          if [ ! -d "android" ]; then
            echo "Android folder missing. Regenerating platform files..."
            flutter create --platforms=android --project-name mall .
          else
            echo "✅ Android folder already exists."
          fi

      - name: Add INTERNET Permission safely
        run: |
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          if grep -q "android.permission.INTERNET" "$MANIFEST_PATH"; then
            echo "✅ INTERNET permission already exists in AndroidManifest.xml"
          else
            sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET" />' "$MANIFEST_PATH"
            echo "✅ INTERNET permission successfully injected!"
          fi

      - name: Get Dependencies
        run: flutter pub get

      - name: Build APK (Release)
        run: flutter build apk --release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/**/*.apk
