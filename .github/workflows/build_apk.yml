name: Build Flutter APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # Updated to v4

      - name: Setup Java
        uses: actions/setup-java@v4 # Updated to v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0' # Stable Flutter version
          channel: 'stable'

      # Yeh step aapke AndroidManifest.xml me Internet permission inject karega
      - name: Add Permissions to AndroidManifest
        run: |
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET" />' android/app/src/main/AndroidManifest.xml
          echo "✅ INTERNET permission successfully added to AndroidManifest.xml"

      - name: Get Dependencies
        run: flutter pub get

      - name: Build APK (Release)
        run: flutter build apk --release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4 # FIXED: Updated to v4 to solve your error
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
